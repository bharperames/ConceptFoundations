<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Concept Foundations</title>
<meta name="description" content="Foundational cognitive primitives for toddlers — same/different, big/small, more/less, in/out, part/whole — with touch telemetry and a parent dashboard.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F2F7FB">
<style>
/* ═══════════════ Tokens ═══════════════ */
:root{
  color-scheme: light;
  /* child world: morning sky */
  --sky-1:#F6FAFE; --sky-2:#E7F1FA;
  --ink:#22384A; --ink-soft:#5D7285;
  --card:#FFFFFF;
  --line:#D8E5F0;
  --coral:#FF5D55; --sun:#FFC02E; --grass:#33C06A;
  --sea:#3D8BFF; --grape:#9B6DF2; --tang:#FF8A3C;
  --stone:#CBDDEC; --stone-done:#3D8BFF;
  /* grown-up dashboard: dataviz chrome */
  --d-page:#F1F5F9; --d-card:#fcfcfb; --d-ink:#0b0b0b; --d-ink2:#52514e;
  --d-muted:#898781; --d-grid:#e1e0d9; --d-axis:#c3c2b7;
  --s1:#2a78d6; --s2:#008300; --d-good:#006300; --d-crit:#d03b3b;
  --round: ui-rounded, "SF Pro Rounded", "Arial Rounded MT Bold", system-ui, sans-serif;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--round);
  background:linear-gradient(180deg,var(--sky-1),var(--sky-2));
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none; user-select:none;
  overscroll-behavior:none;
}
button{font-family:inherit;color:inherit;cursor:pointer}
button:focus-visible{outline:3px solid var(--sea);outline-offset:3px;border-radius:12px}
.hidden{display:none !important}
.view{position:fixed;inset:0;overflow:hidden}

/* ═══════════════ Home ═══════════════ */
#view-home{overflow-y:auto;padding:max(20px,env(safe-area-inset-top)) 20px 90px}
.home-header{text-align:center;margin:26px auto 8px}
.logo-dots{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
.logo-dots span{width:18px;height:18px;border-radius:50%;background:var(--sea)}
.logo-dots .dot-diff{background:var(--coral);border-radius:5px;transform:rotate(8deg)}
.home-header h1{font-size:clamp(26px,4.5vw,40px);font-weight:800;letter-spacing:-.5px;margin:0}
.home-sub{color:var(--ink-soft);font-size:17px;margin:6px 0 0}
.concept-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;max-width:900px;margin:28px auto 0}
.ccard{
  position:relative;width:196px;padding:20px 14px 16px;border:none;
  background:var(--card);border-radius:28px;text-align:center;
  box-shadow:0 6px 20px rgba(61,107,153,.12), 0 1px 0 rgba(61,107,153,.06);
  transition:transform .15s ease;
}
.ccard:active{transform:scale(.96)}
.ccard svg.cicon{width:86px;height:86px;display:block;margin:0 auto}
.ccard .cname{display:block;font-size:19px;font-weight:800;margin-top:8px}
.ccard .clevel{display:block;font-size:13px;color:var(--ink-soft);margin-top:2px;font-weight:600}
.ccard .ladder{display:flex;justify-content:center;gap:5px;margin-top:10px}
.ladder i{width:9px;height:9px;border-radius:50%;background:var(--stone)}
.ladder i.done{background:var(--grass)}
.ladder i.cur{background:var(--sun);transform:scale(1.25)}
.ccard.locked{opacity:.55;filter:saturate(.4)}
.ccard.locked .lock{
  position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;
  background:var(--sky-2);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);
}
.ccard .lock{display:none}
.ccard.locked .lock{display:flex}

.grownups{
  position:fixed;right:18px;bottom:max(16px,env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:8px;overflow:hidden;
  border:none;border-radius:999px;padding:12px 18px;
  background:rgba(255,255,255,.85);color:var(--ink-soft);
  font-size:14px;font-weight:700;box-shadow:0 3px 12px rgba(61,107,153,.14);
  touch-action:none;
}
.grownups .hold-fill{
  position:absolute;inset:0;background:var(--sea);opacity:.22;
  transform:scaleX(0);transform-origin:left;pointer-events:none;
}
.grownups.holding .hold-fill{transform:scaleX(1);transition:transform 2.2s linear}

/* ═══════════════ Play ═══════════════ */
#view-play{touch-action:none}
.btn-round{
  position:absolute;z-index:30;width:52px;height:52px;border-radius:50%;border:none;
  background:rgba(255,255,255,.9);color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(61,107,153,.16);
}
.btn-exit{top:max(14px,env(safe-area-inset-top));left:16px}
.stones{
  position:absolute;top:max(24px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:20;
}
.stone{width:30px;height:17px;border-radius:10px;background:var(--stone);transition:background .3s}
.stone.done{background:var(--stone-done);animation:stonepop .45s ease}
.stone.cur{outline:3px solid rgba(61,139,255,.35);outline-offset:2px}
@keyframes stonepop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}

.stage{position:absolute;inset:70px 0 96px;touch-action:none}
.el{
  position:absolute;transform:translate(-50%,-50%);
  width:calc(var(--s)*1vmin);height:calc(var(--s)*1vmin);
  background:none;border:none;padding:0;display:flex;align-items:center;justify-content:center;
}
.el svg{width:100%;height:100%;display:block;overflow:visible}
.el .emoji{font-size:calc(var(--s)*.86*1vmin);line-height:1}
.el.appear{animation:popin .4s cubic-bezier(.2,1.4,.4,1) both}
@keyframes popin{from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1)}}
.el.tappable:active{transform:translate(-50%,-50%) scale(.92)}
.el.pulse{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.13);filter:drop-shadow(0 0 14px rgba(61,139,255,.7))}}
.el.wobble{animation:wobble .45s ease}
@keyframes wobble{0%,100%{transform:translate(-50%,-50%) rotate(0)}25%{transform:translate(-50%,-50%) rotate(-7deg)}75%{transform:translate(-50%,-50%) rotate(7deg)}}
.el.glowring{filter:drop-shadow(0 0 6px var(--sun)) drop-shadow(0 0 16px var(--sun))}
.el.muted{opacity:.25;transition:opacity .4s}
.el.sample-card{
  background:#fff;border-radius:22px;padding:1.6vmin;
  box-shadow:0 5px 16px rgba(61,107,153,.18), inset 0 0 0 3px var(--line);
}
.el.grayout{filter:grayscale(1) opacity(.45);transition:filter .4s}
.el.dragging{z-index:40;transition:none !important;filter:drop-shadow(0 10px 16px rgba(34,56,74,.25)) scale(1.04)}
.el.returning{transition:left .5s cubic-bezier(.3,1.2,.4,1), top .5s cubic-bezier(.3,1.2,.4,1)}
.el.snapping{transition:left .18s ease-out, top .18s ease-out}
.el.demo-move{transition:left 1s ease-in-out, top 1s ease-in-out}
.el.placed{filter:none}
.zone-card{
  position:absolute;transform:translate(-50%,-50%);
  width:calc(var(--s)*1.15*1vmin);height:calc(var(--s)*1vmin);
  border:none;padding:0;border-radius:26px;
  background:rgba(255,255,255,.75);
  box-shadow:inset 0 0 0 3px var(--line), 0 4px 14px rgba(61,107,153,.10);
}
.zone-card:active{transform:translate(-50%,-50%) scale(.97)}
.zone-card .mini{position:absolute;transform:translate(-50%,-50%);pointer-events:none}
.zone-card .mini svg{width:100%;height:100%;display:block}
.zone-card.pulse{animation:pulse 1s ease infinite}
.zone-card.grayout{filter:grayscale(1) opacity(.45)}
/* painted-only hit-testing for drag trials (transparent svg regions pass through) */
.painted-hit{pointer-events:none}
.painted-hit svg{pointer-events:none}
.painted-hit svg .hit{pointer-events:visiblePainted}

.prompt-bubble{
  position:absolute;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:12px;max-width:86vw;
  background:var(--card);border-radius:999px;padding:10px 26px 10px 12px;
  box-shadow:0 8px 24px rgba(61,107,153,.18);z-index:20;
  animation:bubblein .35s cubic-bezier(.2,1.3,.4,1) both;
}
@keyframes bubblein{from{transform:translateX(-50%) translateY(30px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.btn-speaker{
  width:52px;height:52px;border-radius:50%;border:none;flex:none;
  background:var(--sea);color:#fff;display:flex;align-items:center;justify-content:center;
}
.btn-speaker:active{transform:scale(.9)}
.btn-speaker.talking{animation:talk .8s ease infinite}
@keyframes talk{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#prompt-text{font-size:clamp(20px,3.2vw,28px);font-weight:800;letter-spacing:-.2px}

/* ═══════════════ Closed captions ═══════════════ */
.cc-bar{
  position:fixed;left:50%;bottom:104px;transform:translateX(-50%);
  max-width:82vw;z-index:65;pointer-events:none;
  background:rgba(15,26,38,.85);color:#fff;
  font-size:clamp(17px,2.4vw,22px);font-weight:700;letter-spacing:.2px;
  padding:10px 20px;border-radius:14px;text-align:center;
  opacity:0;transition:opacity .18s ease;
}
.cc-bar.on{opacity:1}

/* ═══════════════ FX ═══════════════ */
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.spark{position:absolute;width:16px;height:16px;animation:fly .8s ease-out both}
.spark svg{width:100%;height:100%;overflow:visible}
@keyframes fly{
  from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}
}
.confetto{position:absolute;top:-4vh;width:12px;height:18px;border-radius:3px;animation:fall 2.4s ease-in both}
@keyframes fall{
  from{transform:translateY(0) rotate(0)}
  to{transform:translateY(115vh) rotate(560deg);opacity:.7}
}
.cheer{
  position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(246,250,254,.86);pointer-events:none;
  animation:cheerin .5s cubic-bezier(.2,1.3,.4,1) both;
}
@keyframes cheerin{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.cheer .big{font-size:15vmin}
.cheer .msg{font-size:clamp(28px,5vw,44px);font-weight:800}

/* ═══════════════ Dashboard ═══════════════ */
.dash{overflow-y:auto;background:var(--d-page);font-family:var(--sans);color:var(--d-ink);-webkit-user-select:text;user-select:text}
.dash-header{max-width:980px;margin:0 auto;padding:28px 20px 4px}
.dash-back{border:none;background:none;color:var(--s1);font-size:14px;font-weight:600;padding:6px 0}
.dash-header h1{font-size:26px;font-weight:700;margin:10px 0 4px;letter-spacing:-.3px}
.dash-sub{color:var(--d-ink2);font-size:14px;margin:0;max-width:60ch}
#dash-body{max-width:980px;margin:0 auto;padding:18px 20px 60px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:14px 0 8px}
.tile{background:var(--d-card);border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:16px 18px}
.tile .tv{font-size:30px;font-weight:700;letter-spacing:-.5px}
.tile .tl{font-size:13px;color:var(--d-ink2);margin-top:2px}
.tile .th{font-size:12px;color:var(--d-muted);margin-top:8px;line-height:1.45}
.dash h2{font-size:16px;font-weight:700;margin:30px 0 4px}
.dash .h2-sub{font-size:13px;color:var(--d-ink2);margin:0 0 12px;max-width:70ch}
.chart-card{background:var(--d-card);border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:18px;position:relative}
.legend{display:flex;gap:18px;font-size:13px;color:var(--d-ink2);margin-bottom:10px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:baseline}
.viz-tip{
  position:absolute;pointer-events:none;background:var(--d-ink);color:#fff;
  font-size:12px;padding:6px 10px;border-radius:6px;white-space:nowrap;
  transform:translate(-50%,-130%);opacity:0;transition:opacity .12s;z-index:5;
}
.viz-tip b{font-weight:600}
.dash table{width:100%;border-collapse:collapse;font-size:13px;background:var(--d-card);border:1px solid rgba(11,11,11,.10);border-radius:12px;overflow:hidden}
.dash th{
  text-align:left;font-weight:600;color:var(--d-ink2);font-size:12px;
  padding:10px 14px;border-bottom:1px solid var(--d-grid);background:var(--d-card);
}
.dash td{padding:9px 14px;border-bottom:1px solid var(--d-grid);font-variant-numeric:tabular-nums}
.dash tr:last-child td{border-bottom:none}
.dash td.num,.dash th.num{text-align:right}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px}
.pill.gen{background:#e8f1e8;color:var(--s2)}
.pill.test{background:#e7effa;color:var(--s1)}
.nodemap{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.nodecard{background:var(--d-card);border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:14px 16px}
.nodecard .nn{font-weight:600;font-size:14px}
.nodecard .nl{font-size:12px;color:var(--d-ink2);margin-top:2px}
.nodecard .steps{display:flex;gap:5px;margin-top:10px}
.nodecard .steps i{height:7px;flex:1;border-radius:4px;background:var(--d-grid)}
.nodecard .steps i.done{background:var(--s2)}
.nodecard .steps i.cur{background:var(--s1)}
.dash-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:14px}
.dash-controls .ctl{
  display:flex;align-items:center;gap:10px;background:var(--d-card);
  border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:12px 16px;font-size:13px;
}
.switch{position:relative;width:40px;height:24px;border:none;border-radius:999px;background:var(--d-grid);transition:background .2s;flex:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
.switch.on{background:var(--s2)}
.switch.on::after{left:19px}
.danger{border:1px solid rgba(208,59,59,.4);background:none;color:var(--d-crit);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600}
.danger.armed{background:var(--d-crit);color:#fff}
.empty{
  background:var(--d-card);border:1px dashed var(--d-axis);border-radius:12px;
  padding:40px 24px;text-align:center;color:var(--d-ink2);font-size:14px;margin-top:16px;
}
.empty b{color:var(--d-ink);font-size:16px;display:block;margin-bottom:6px}
.insights{display:grid;gap:10px}
.insight{
  display:flex;gap:12px;align-items:flex-start;background:var(--d-card);
  border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:14px 16px;
}
.insight .ic{flex:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;margin-top:1px}
.insight.good .ic{background:#0ca30c}
.insight.warning .ic{background:#fab219;color:#4a3500}
.insight.serious .ic{background:#ec835a}
.insight .it{font-weight:600;font-size:14px}
.insight .it .tag{font-weight:600;font-size:11px;margin-left:8px;text-transform:uppercase;letter-spacing:.04em}
.insight.good .tag{color:var(--d-good)}
.insight.warning .tag{color:#8a6100}
.insight.serious .tag{color:#b1401f}
.insight .ib{font-size:13px;color:var(--d-ink2);margin-top:3px;line-height:1.5;max-width:78ch}
.sim-card{background:var(--d-card);border:1px solid rgba(11,11,11,.10);border-radius:12px;padding:16px 18px}
.sim-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.sim-row select{
  font:inherit;font-size:13px;padding:9px 12px;border-radius:10px;
  border:1px solid var(--d-axis);background:var(--d-card);color:var(--d-ink);
}
.btn-primary{
  border:none;background:var(--s1);color:#fff;border-radius:10px;
  padding:10px 16px;font-size:13px;font-weight:600;
}
.btn-quiet{
  border:1px solid var(--d-axis);background:none;color:var(--d-ink2);
  border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;
}
.sim-note{font-size:12px;color:var(--d-muted);margin-top:10px;line-height:1.5}
.pill.sim{background:#f3ecdf;color:#8a6100}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<main id="view-home" class="view">
  <header class="home-header">
    <div class="logo-dots" aria-hidden="true"><span></span><span></span><span class="dot-diff"></span></div>
    <h1>Concept Foundations</h1>
    <p class="home-sub">Tap a game to start</p>
  </header>
  <div id="concept-grid" class="concept-grid"></div>
  <button id="btn-grownups" class="grownups">
    <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M12 2a5 5 0 0 1 5 5v3h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v3h6V7a3 3 0 0 0-3-3z"/></svg>
    <span>Hold for grown-ups</span>
    <i class="hold-fill" aria-hidden="true"></i>
  </button>
</main>

<!-- ══════════ PLAY ══════════ -->
<main id="view-play" class="view hidden">
  <button id="btn-home" class="btn-round btn-exit" aria-label="Back to games">
    <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M12 3.2 2.8 11h2.4v9h5.2v-6h3.2v6h5.2v-9h2.4z"/></svg>
  </button>
  <div id="stones" class="stones" aria-hidden="true"></div>
  <div id="stage" class="stage"></div>
  <div id="prompt-bubble" class="prompt-bubble hidden">
    <button id="btn-replay" class="btn-speaker" aria-label="Say it again">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 4V5L8 9H4zm12.5 3a3.5 3.5 0 0 0-2-3.15v6.3a3.5 3.5 0 0 0 2-3.15zm-2-7v2.06A5.5 5.5 0 0 1 18.5 12a5.5 5.5 0 0 1-4 5.94V20a7.5 7.5 0 0 0 0-15z"/></svg>
    </button>
    <span id="prompt-text"></span>
  </div>
</main>

<!-- ══════════ DASHBOARD ══════════ -->
<main id="view-dash" class="view dash hidden">
  <header class="dash-header">
    <button id="btn-dash-back" class="dash-back">&larr; Back to games</button>
    <h1>Learning dashboard</h1>
    <p class="dash-sub">Every session is an event stream. These numbers come straight from your child's touches — nothing is estimated.</p>
  </header>
  <div id="dash-body"></div>
</main>

<div id="fx-layer" aria-hidden="true"></div>

<script type="module">
/* ════════════════════════════════ 1 · Utilities ═══════════════════════════ */
const $ = s => document.querySelector(s);
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() :
  'xxxx-xxxx-xxxx'.replace(/x/g, () => Math.floor(Math.random()*16).toString(16)));
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));

/* Deterministic PRNG: strict rulesets pick from constrained pools via this
   seeded stream, and the seed is stored on the session for exact replay. */
function hashStr(str){
  let h = 2166136261;
  for (let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const pick = (rng, arr) => arr[Math.floor(rng()*arr.length)];
function pick2 (rng, arr){ const a = pick(rng,arr); let b = pick(rng,arr); while (b===a) b = pick(rng,arr); return [a,b]; }
function shuffle(rng, arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j = Math.floor(rng()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}
const median = xs => {
  if (!xs.length) return null;
  const s = xs.slice().sort((a,b)=>a-b), m = Math.floor(s.length/2);
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
};

/* ════════════════════════════════ 2 · Audio ═══════════════════════════════ */
/* Closed captions: every spoken utterance is mirrored as on-screen text when
   enabled (dashboard toggle, or ?cc=1) — lets testers work with volume off. */
const Captions = {
  el: null, timer: 0,
  enabled(){
    return !!Store.settings().cc || new URLSearchParams(location.search).has('cc');
  },
  show(text){
    if (!this.enabled()) return;
    if (!this.el){
      this.el = document.createElement('div');
      this.el.className = 'cc-bar';
      this.el.setAttribute('aria-live', 'polite');
      document.body.appendChild(this.el);
    }
    this.el.textContent = text;
    this.el.classList.add('on');
    clearTimeout(this.timer);
    // linger long enough to read, roughly matching speech duration
    this.timer = setTimeout(() => this.el.classList.remove('on'),
      Math.max(1600, 500 + text.length * 70));
  },
};

const Audio2 = (() => {
  let ctx = null, voice = null, unlocked = false;
  // ?mute=1 silences speech and tones (for automated testing); prompt timing
  // still fires so TTFT telemetry keeps its semantics.
  const muted = new URLSearchParams(location.search).has('mute');

  function unlock(){
    if (unlocked) return; unlocked = true;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
    } catch(e){ ctx = null; }
    if ('speechSynthesis' in window){
      const load = () => {
        const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
        voice = vs.find(v => /Samantha|Karen|Google US/i.test(v.name)) || vs[0] || null;
      };
      load(); speechSynthesis.onvoiceschanged = load;
    }
  }

  function speak(text, onend){
    Captions.show(text);
    if (muted){ if (onend) setTimeout(onend, 250); return; }
    if (!('speechSynthesis' in window)){ if (onend) setTimeout(onend, 600); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (voice) u.voice = voice;
    u.rate = 0.9; u.pitch = 1.1;
    let done = false;
    const fin = () => { if (!done){ done = true; if (onend) onend(); } };
    u.onend = fin; u.onerror = fin;
    // Fallback in case onend never fires (some engines):
    setTimeout(fin, 900 + text.length * 90);
    const spk = $('#btn-replay'); if (spk){ spk.classList.add('talking'); u.addEventListener('end', ()=>spk.classList.remove('talking')); setTimeout(()=>spk.classList.remove('talking'), 900+text.length*90); }
    speechSynthesis.speak(u);
  }

  function tone(freq, t0, dur, type='sine', gain=0.16){
    if (!ctx || muted) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
    g.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + dur + 0.05);
  }
  const correct  = () => { tone(660,0,.18,'triangle'); tone(880,.12,.25,'triangle'); };
  const wrong    = () => { tone(180,0,.22,'sine',.1); };
  const snapSnd  = () => { tone(520,0,.1,'triangle',.12); tone(780,.06,.12,'triangle',.12); };
  const fanfare  = () => { [523,659,784,1047].forEach((f,i)=>tone(f, i*.13, .3, 'triangle')); };
  return { unlock, speak, correct, wrong, snapSnd, fanfare };
})();

/* Layout helpers: positions are % of stage, sizes are vmin units. */
function rowXs(n){
  if (n===1) return [50];
  const gap = Math.min(26, 76/(n-1));
  return Array.from({length:n}, (_,i) => 50 + (i-(n-1)/2)*gap);
}
const elShape = (id, html, x, y, s, extra={}) => ({ id, html, x, y, s, ...extra });

function tapTrial({prompt, say, elements, state}){
  return { kind:'tap', state, prompt, say: say||prompt, elements, timeoutMs: 9000 };
}
function watchTrial({prompt, say, elements, state, autoMs}){
  return { kind:'watch', state, prompt, say: say||prompt, elements, autoMs: autoMs||3400, timeoutMs: 0 };
}
function dragTrial({prompt, say, elements, pieces, state, decoys}){
  return { kind:'drag', state, prompt, say: say||prompt, elements, pieces, decoys: decoys||[], timeoutMs: 14000 };
}

/* Cluster offsets (in % of zone box) for quantity groups, counts 1–6 */
const CLUSTER = {
  1:[[50,50]], 2:[[36,50],[64,50]], 3:[[50,32],[34,64],[66,64]],
  4:[[34,34],[66,34],[34,66],[66,66]], 5:[[50,28],[30,50],[70,50],[38,74],[62,74]],
  6:[[32,30],[68,30],[26,58],[74,58],[42,78],[58,78]],
};
function zoneEl(id, x, count, itemSvg){
  const minis = CLUSTER[count].map(([mx,my]) =>
    `<span class="mini" style="left:${mx}%;top:${my}%;width:26%;height:26%">${itemSvg}</span>`).join('');
  return { id, x, y:50, s:42, zone:true, html:minis, count };
}

/* Shared generators (the strict rulesets) */
function outlierLevel(rng, mode){
  // mode: 'shape' (color static), 'color' (shape static), 'both'
  const baseColor = pick(rng, COLOR_KEYS);
  const pair = pick(rng, COLOR_PAIRS.filter(p => p.includes(baseColor))) || pick(rng, COLOR_PAIRS);
  const oddColor = pair[0] === baseColor ? pair[1] : pair[0];
  const [baseShape, oddShape] = pick2(rng, SHAPE_KEYS);
  const oc = mode === 'shape' ? baseColor : oddColor;
  const os = mode === 'color' ? baseShape : oddShape;
  const mkTest = () => {
    const n = mode === 'both' ? 5 : 4;
    const xs = rowXs(n), ti = Math.floor(rng()*n);
    return tapTrial({ state:'TEST', prompt:'Tap the different one', say:'One is different! Tap the different one.',
      elements: xs.map((x,i) => elShape(i===ti?'target':'d'+i,
        SHAPES[i===ti?os:baseShape](C[i===ti?oc:baseColor]), x, 52, n===5?15:17,
        { tappable:true, target:i===ti })) });
  };
  return {
    expose: watchTrial({ state:'EXPOSE', prompt:'Same', say:'Look. All the same.',
      elements:[ elShape('a', SHAPES[baseShape](C[baseColor]), 38, 50, 19), elShape('b', SHAPES[baseShape](C[baseColor]), 62, 50, 19) ]}),
    contrast: watchTrial({ state:'CONTRAST', prompt:'Different', say:'This one is different.',
      elements:[ elShape('a', SHAPES[baseShape](C[baseColor]), 38, 50, 19), elShape('b', SHAPES[os](C[oc]), 62, 50, 19) ]}),
    tests:[mkTest(), mkTest(), mkTest()],
  };
}
function sizeLevel(rng, {big, small, ask}){
  const ck = pick(rng, COLOR_KEYS), sk = pick(rng, SHAPE_KEYS);
  const mk = () => SHAPES[sk](C[ck]);
  const mkTest = () => {
    const flip = rng() < .5, xs = [32, 68];
    const els = [
      elShape('big', mk(), xs[flip?1:0], 50, big, {tappable:true, target: ask==='big'}),
      elShape('small', mk(), xs[flip?0:1], ask==='big'?62:56, small, {tappable:true, target: ask==='small'}),
    ];
    return tapTrial({ state:'TEST', prompt:`Tap the ${ask} one`, say:`Tap the ${ask} one!`, elements: els });
  };
  return {
    expose: watchTrial({ state:'EXPOSE', prompt:'Big', say:'Look. Big!',
      elements:[ elShape('a', mk(), 50, 50, big) ]}),
    contrast: watchTrial({ state:'CONTRAST', prompt:'Small', say:'And this one is small.',
      elements:[ elShape('a', mk(), 50, 58, small) ]}),
    tests:[mkTest(), mkTest(), mkTest()],
  };
}
function quantityLevel(rng, {a, b, ask, item}){
  const ic = item === 'apple' ? C.coral : pick(rng, ['sea','grape','tang']);
  const svg = SIL[item](ic);
  const mkTest = () => {
    const bigLeft = rng() < .5;
    const za = zoneEl('side-a', bigLeft?72:28, a, svg);
    const zb = zoneEl('side-b', bigLeft?28:72, b, svg);
    const target = ask === 'more' ? zb : za;
    target.target = true;
    return tapTrial({ state: ask==='less' ? 'GENERALIZE' : 'TEST',
      prompt:`Tap the side with ${ask}`, say:`Which side has ${ask}? Tap it!`,
      elements:[za, zb] });
  };
  return {
    expose: watchTrial({ state:'EXPOSE', prompt: a===1?'One':'A few', say: a===1 ? `One ${item}.` : `${a===2?'Two':'Three'} ${item}s.`,
      elements:[ zoneEl('za', 50, a, svg) ]}),
    contrast: watchTrial({ state:'CONTRAST', prompt:'More!', say:'Look — more!',
      elements:[ zoneEl('zb', 50, b, svg) ]}),
    tests:[mkTest(), mkTest(), mkTest()],
  };
}

/* ═══════════════════════ 5 · Storage ══════════════════════════════════════ */
const Store = {
  KEY_S:'cf_sessions_v2', KEY_P:'cf_progress_v2', KEY_C:'cf_settings_v2',
  sessions(){ try { return JSON.parse(localStorage.getItem(this.KEY_S)) || []; } catch(e){ return []; } },
  saveSessions(s){ try { localStorage.setItem(this.KEY_S, JSON.stringify(s.slice(-300))); } catch(e){} },
  progress(){
    try { return JSON.parse(localStorage.getItem(this.KEY_P)) || {}; } catch(e){ return {}; }
  },
  saveProgress(p){ try { localStorage.setItem(this.KEY_P, JSON.stringify(p)); } catch(e){} },
  settings(){ try { return JSON.parse(localStorage.getItem(this.KEY_C)) || {unlockAll:false, seedCounter:0}; } catch(e){ return {unlockAll:false, seedCounter:0}; } },
  saveSettings(s){ try { localStorage.setItem(this.KEY_C, JSON.stringify(s)); } catch(e){} },
  wipe(){ localStorage.removeItem(this.KEY_S); localStorage.removeItem(this.KEY_P); localStorage.removeItem(this.KEY_C); },
};
function nodeProgress(key){
  const p = Store.progress();
  if (!p[key]) p[key] = { levelIdx:0, mastered:[], consecFallbacks:0, isoStats:{} };
  return p[key];
}
function saveNodeProgress(key, np){
  const p = Store.progress(); p[key] = np; Store.saveProgress(p);
}

/* ═══════════════════════ 6 · Telemetry ════════════════════════════════════ */
/* InteractionEvent per spec: eventId, trialId, timestamp, type (TAP | DRAG_START |
   DRAG_END | TIMEOUT), coordinateX/Y, hitElementId, isCorrectIntent,
   timeSincePromptMs — plus missDistancePx, evaluated client-side. */
const Telemetry = {
  session: null,
  begin(node, level, seed){
    this.session = {
      id: uuid(), userId:'child-local', node: node.key, nodeTitle: node.parentName,
      levelId: level.id, levelName: level.name, isGen: !!level.isGen, seed,
      startTime: Date.now(), endTime: null, trials: [], events: [],
    };
  },
  addTrial(t){ if (this.session) this.session.trials.push(t); },
  event(e){ if (this.session) this.session.events.push({ eventId: uuid(), ...e }); },
  end(completed, outcome){
    if (!this.session) return null;
    this.session.endTime = Date.now();
    this.session.completed = completed;
    if (outcome) this.session.outcome = outcome;
    const s = Store.sessions(); s.push(this.session); Store.saveSessions(s);
    const done = this.session; this.session = null; return done;
  },
};

/* Shared DDA rule (curriculum implementation note): the live engine and the
   simulation harness both route run results through this exact function. */
function applyRunOutcome(node, level, results){
  const tests = results.filter(r => r.kind !== 'watch');
  const clean = tests.filter(r => r.firstAttemptCorrect && !r.usedFallback).length;
  const fellback = tests.filter(r => r.usedFallback).length;
  const np = nodeProgress(node.key);
  if (fellback > 0) np.consecFallbacks += fellback;
  else np.consecFallbacks = 0;
  let outcome = 'stay';
  if (np.consecFallbacks >= 3){
    np.consecFallbacks = 0;
    const curIdx = node.levels.indexOf(level);
    if (level.id === '1.4'){
      // route to whichever isolation variable the child struggled with more
      const s12 = np.isoStats['1.2']||0, s13 = np.isoStats['1.3']||0;
      np.levelIdx = (s13 > s12) ? 2 : 1;
    } else {
      np.levelIdx = Math.max(0, curIdx - 1);
    }
    outcome = 'down';
  } else if (clean >= Math.max(1, tests.length - 1)){
    const curIdx = node.levels.indexOf(level);
    if (!np.mastered.includes(level.id)) np.mastered.push(level.id);
    np.levelIdx = Math.min(node.levels.length - 1, curIdx + 1);
    outcome = (curIdx === node.levels.length - 1) ? 'complete' : 'up';
  }
  saveNodeProgress(node.key, np);
  return outcome;
}

/* Frustration: >3 unproductive taps inside 1 s (spec §3). Detected live for
   step-down, and re-derivable from the raw event stream for the dashboard. */
function makeFrustrationDetector(onFire){
  let taps = [];
  return function feed(ts, unproductive){
    if (!unproductive){ taps = []; return; }
    taps.push(ts);
    taps = taps.filter(t => ts - t <= 1000);
    if (taps.length > 3){ taps = []; onFire(); }
  };
}
function countFrustration(events){
  let taps = [], n = 0;
  for (const e of events){
    if (e.type !== 'TAP') continue;
    if (e.isCorrectIntent){ taps = []; continue; }
    taps.push(e.timestamp);
    taps = taps.filter(t => e.timestamp - t <= 1000);
    if (taps.length > 3){ n++; taps = []; }
  }
  return n;
}
